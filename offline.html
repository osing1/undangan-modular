<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Offline - Undangan Pernikahan</title>
    <link rel="icon" href="/assets/icons/icon.svg" type="image/svg+xml">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'DM Sans', -apple-system, BlinkMacSystemFont, sans-serif;
            background: linear-gradient(135deg, #000000 0%, #1a1a1a 100%);
            color: #ffffff;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            overflow-x: hidden;
        }
        
        .container {
            max-width: 500px;
            text-align: center;
            animation: fadeIn 0.8s ease;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .icon-wrapper {
            width: 120px;
            height: 120px;
            margin: 0 auto 2rem;
            background: rgba(216, 161, 109, 0.1);
            border: 2px solid #D8A16D;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            animation: pulse 2s ease-in-out infinite;
        }
        
        @keyframes pulse {
            0%, 100% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.05); opacity: 0.8; }
        }
        
        .icon-wrapper svg {
            width: 60px;
            height: 60px;
            stroke: #D8A16D;
            stroke-width: 2;
            fill: none;
        }
        
        h1 {
            font-family: 'Bona Nova', serif;
            font-size: 2rem;
            color: #D8A16D;
            margin-bottom: 1rem;
            letter-spacing: -0.02em;
        }
        
        p {
            font-size: 1rem;
            line-height: 1.6;
            color: rgba(255, 255, 255, 0.8);
            margin-bottom: 2rem;
        }
        
        .status {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.5rem 1rem;
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.3);
            border-radius: 9999px;
            font-size: 0.875rem;
            color: #ef4444;
            margin-bottom: 2rem;
        }
        
        .status-dot {
            width: 8px;
            height: 8px;
            background: #ef4444;
            border-radius: 50%;
            animation: blink 1.5s ease-in-out infinite;
        }
        
        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }
        
        .btn {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.875rem 2rem;
            background: #000000;
            color: #ffffff;
            border: 1px solid #D8A16D;
            border-radius: 0;
            font-size: 0.875rem;
            font-weight: 500;
            text-decoration: none;
            cursor: pointer;
            transition: all 0.2s ease;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }
        
        .btn:hover {
            background: #D8A16D;
            color: #000000;
        }
        
        .btn svg {
            width: 18px;
            height: 18px;
        }
        
        .info {
            margin-top: 3rem;
            padding-top: 2rem;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            font-size: 0.75rem;
            color: rgba(255, 255, 255, 0.5);
        }
        
        .info a {
            color: #D8A16D;
            text-decoration: none;
        }
        
        .info a:hover {
            text-decoration: underline;
        }
        
        @media (max-width: 480px) {
            h1 { font-size: 1.5rem; }
            p { font-size: 0.875rem; }
            .icon-wrapper { width: 100px; height: 100px; }
            .icon-wrapper svg { width: 50px; height: 50px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="icon-wrapper">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
                <line x1="1" y1="1" x2="23" y2="23"></line>
                <path d="M16.72 11.06A10.94 10.94 0 0 1 19 12.55"></path>
                <path d="M5 12.55a10.94 10.94 0 0 1 5.17-2.39"></path>
                <path d="M10.71 5.05A16 16 0 0 1 22.58 9"></path>
                <path d="M1.42 9a15.91 15.91 0 0 1 4.7-2.88"></path>
                <path d="M8.53 16.11a6 6 0 0 1 6.95 0"></path>
                <line x1="12" y1="20" x2="12.01" y2="20"></line>
            </svg>
        </div>
        
        <div class="status">
            <span class="status-dot"></span>
            <span>Anda sedang offline</span>
        </div>
        
        <h1>Tidak Ada Koneksi Internet</h1>
        
        <p>
            Mohon maaf, undangan tidak dapat dimuat karena perangkat Anda tidak terhubung ke internet. 
            Silakan periksa koneksi dan coba lagi.
        </p>
        
        <button class="btn" onclick="tryReconnect()">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <polyline points="23 4 23 10 17 10"></polyline>
                <polyline points="1 20 1 14 7 14"></polyline>
                <path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"></path>
            </svg>
            <span>Coba Lagi</span>
        </button>
        
        <div class="info">
            <p>
                Undangan Pernikahan <strong>Chyntia & Rian</strong><br>
                <a href="https://mer.id" target="_blank" rel="noopener">Powered by mer.id</a>
            </p>
        </div>
    </div>
    
    <script>
        function tryReconnect() {
            // Check if online
            if (navigator.onLine) {
                window.location.reload();
            } else {
                alert('Perangkat masih offline. Silakan aktifkan koneksi internet Anda.');
            }
        }
        
        // Auto-retry when back online
        window.addEventListener('online', () => {
            setTimeout(() => {
                window.location.reload();
            }, 1000);
        });
        
        // Listen for service worker messages
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.addEventListener('message', (event) => {
                if (event.data.type === 'ONLINE') {
                    window.location.reload();
                }
            });
        }
    </script>
</body>
</html>
